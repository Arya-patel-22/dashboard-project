<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b3d91" />
    <title>Student Portal</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f3f6fb;
        color: #1f2937;
      }
      header {
        background: linear-gradient(135deg, #0b3d91 0%, #4f81f7 100%);
        color: white;
        padding: 32px 24px;
        text-align: center;
      }
      header h1 {
        margin: 0;
        font-size: 2.4rem;
        letter-spacing: -0.03em;
      }
      header p {
        margin: 12px auto 0;
        max-width: 760px;
        color: rgba(255, 255, 255, 0.85);
        font-size: 1rem;
      }
      .container {
        display: grid;
        gap: 24px;
        max-width: 1200px;
        margin: -40px auto 40px;
        padding: 0 24px;
        grid-template-columns: 1.4fr 1fr;
      }
      .card {
        background: white;
        border-radius: 24px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        padding: 28px;
      }
      .card h2 {
        margin-top: 0;
        font-size: 1.4rem;
      }
      .quick-links {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .link-box {
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 18px;
        background: #f8fafc;
      }
      .link-box strong {
        display: block;
        margin-bottom: 8px;
        color: #0f172a;
      }
      .status {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 24px;
      }
      .status span {
        font-weight: 700;
      }
      .login-panel {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .login-panel label {
        font-size: 0.92rem;
        color: #334155;
      }
      .login-panel input {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        font-size: 1rem;
      }
      .button {
        background: #0b3d91;
        color: white;
        border: none;
        padding: 14px 18px;
        border-radius: 14px;
        font-size: 1rem;
        cursor: pointer;
      }
      .courses {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .course-item {
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 18px;
        margin-bottom: 14px;
      }
      .course-item h3 {
        margin: 0 0 8px;
        font-size: 1.05rem;
      }
      .footer {
        text-align: center;
        color: #475569;
        font-size: 0.95rem;
        margin-top: 16px;
      }
      @media (max-width: 860px) {
        .container {
          grid-template-columns: 1fr;
          margin-top: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
  </body>
</html>
