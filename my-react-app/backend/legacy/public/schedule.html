<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule - Student Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <h1>Schedule</h1>
        <p>See today’s timetable and class periods at a glance.</p>
      </div>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="students.html">Students</a>
        <a href="courses.html">Courses</a>
        <a href="schedule.html">Schedule</a>
        <a href="about.html">About</a>
      </nav>
    </header>

    <main>
      <section class="card">
        <h2>Today's schedule</h2>
        <table class="schedule-table">
          <thead>
            <tr>
              <th>Time</th>
              <th>Class</th>
              <th>Room</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>8:00 - 9:00</td>
              <td>Mathematics</td>
              <td>Room 101</td>
            </tr>
            <tr>
              <td>9:15 - 10:15</td>
              <td>Science</td>
              <td>Room 202</td>
            </tr>
            <tr>
              <td>10:30 - 11:30</td>
              <td>English</td>
              <td>Room 103</td>
            </tr>
            <tr>
              <td>12:00 - 1:00</td>
              <td>ICT</td>
              <td>Lab A</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>
</body>
</html>
