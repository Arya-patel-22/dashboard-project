<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <h1>Student Portal</h1>
        <p>Fast, simple, and responsive student management for the public folder.</p>
      </div>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="students.html">Students</a>
        <a href="courses.html">Courses</a>
        <a href="schedule.html">Schedule</a>
        <a href="about.html">About</a>
      </nav>
      <div class="hero-actions">
        <input id="searchInput" type="search" placeholder="Search students..." />
      </div>
    </header>

    <main>
      <section class="card form-card">
        <h2>Add new student</h2>
        <form id="studentForm">
          <div class="field-row">
            <label for="name">Name</label>
            <input id="name" type="text" placeholder="Full name" required />
          </div>
          <div class="field-row">
            <label for="grade">Grade</label>
            <input id="grade" type="text" placeholder="Grade or year" required />
          </div>
          <div class="field-row">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="student@example.com" required />
          </div>
          <button type="submit">Add Student</button>
        </form>
      </section>

      <section class="card list-card">
        <div class="list-header">
          <h2>Student list</h2>
          <span id="studentCount">0 students</span>
        </div>
        <div id="studentList" class="student-list"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
